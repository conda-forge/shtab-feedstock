schema_version: 1

context:
  version: "1.8.1"

package:
  name: shtab
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/shtab/shtab-${{ version }}.tar.gz
  sha256: 3edaf857ba164a0d7bb64e958eab8d6756d5aee3949c7f36a7e779bf1ce3b897

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps
  python:
    entry_points:
    - shtab = shtab.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77
    - setuptools_scm >=3.4
    - toml
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - shtab
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - files:
      source:
        - tests
        - pyproject.toml
    requirements:
      run:
        - pytest >=6.0
        - pytest-cov
        - pytest-timeout
        - python ${{ python_min }}.*
    script:
      - shtab -h
      - shtab -u shtab.main.get_main_parser
      - pytest

about:
  license: MPL-2.0
  license_file: LICENCE
  homepage: https://tqdm.github.io/shtab
  repository: https://github.com/tqdm/shtab
  summary: Automagic shell tab completion for Python CLI applications
  description: |
    - What: Automatically generate shell tab completion scripts for Python CLI apps
    - Why: Speed & correctness. Alternatives like `argcomplete` & `pyzshcomplete` are slow and have side-effects
    - How: `shtab` processes an `argparse.ArgumentParser` object to generate a tab completion script for your shell

extra:
  recipe-maintainers:
    - casperdcl
    - '0x2b3bfa0'
    - efiop
    - shcheklein
